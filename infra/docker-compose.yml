name: foodgram

services:
  db:
    image: postgres:12.22-bookworm
    restart: unless-stopped
    env_file:
      - ${FOODGRAM_ENV_FILE:-/etc/foodgram/foodgram.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodgram_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$DB_NAME"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/laser54/foodgram-project-react-backend:${IMAGE_TAG:?IMAGE_TAG must be a full Git SHA}
    restart: unless-stopped
    env_file:
      - ${FOODGRAM_ENV_FILE:-/etc/foodgram/foodgram.env}
    volumes:
      - static_value:/code/static
      - media_value:/code/media
    networks:
      - foodgram_internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    image: ghcr.io/laser54/foodgram-project-react-frontend:${IMAGE_TAG:?IMAGE_TAG must be a full Git SHA}
    restart: unless-stopped
    volumes:
      - static_value:/static:ro
      - media_value:/media:ro
    networks:
      - foodgram_internal
      - traefik
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
    labels:
      traefik.enable: "true"
      traefik.docker.network: rag-stack_internal
      traefik.http.routers.foodgram-http.rule: Host(`foodgram.larin.work`)
      traefik.http.routers.foodgram-http.entrypoints: web
      traefik.http.routers.foodgram-http.middlewares: to-https@docker
      traefik.http.routers.foodgram-https.rule: Host(`foodgram.larin.work`)
      traefik.http.routers.foodgram-https.entrypoints: websecure
      traefik.http.routers.foodgram-https.tls: "true"
      traefik.http.routers.foodgram-https.tls.certresolver: le
      traefik.http.services.foodgram.loadbalancer.server.port: "8080"

networks:
  foodgram_internal:
    internal: true
  traefik:
    external: true
    name: rag-stack_internal

volumes:
  postgres_data:
  static_value:
  media_value:
